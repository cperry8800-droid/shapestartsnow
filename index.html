<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Flowing gradient background */
    .bg-flow {
      position: fixed; inset: 0; z-index: 0;
    }

    .bg-flow canvas {
      width: 100%; height: 100%;
    }

    /* Grain overlay */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* Content */
    .intro-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; width: 100%;
      text-align: center;
    }

    /* ===== Loading Screen ===== */
    .loader-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .loader-overlay.done {
      opacity: 0;
      pointer-events: none;
    }

    .loader-box {
      display: flex; flex-direction: column;
      align-items: center; gap: 32px;
    }

    .loader-logo {
      height: 80px; width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.4;
    }

    .loader-track {
      width: 220px; height: 1px;
      background: rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .loader-fill {
      position: absolute; left: 0; top: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(45,212,191,0.6), #2DD4BF);
      transition: width 0.15s linear;
    }

    .loader-percent {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
    }

    .loader-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    .intro-logo {
      height: 140px; width: auto;
      margin-bottom: 48px;
      filter: brightness(0) invert(1);
      opacity: 0;
    }
    .intro-logo.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 logoPulse 2.5s ease-in-out 1.2s infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 1; filter: brightness(0) invert(1) drop-shadow(0 0 12px rgba(45, 212, 191, 0.4)); }
      50% { opacity: 0.15; filter: brightness(0) invert(1) drop-shadow(0 0 0px rgba(45, 212, 191, 0)); }
    }

    .intro-tagline {
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 64px;
      opacity: 0;
    }
    .intro-tagline.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .enter-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 18px 64px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      pointer-events: none;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .enter-btn.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      pointer-events: auto;
    }

    .enter-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #2DD4BF, #14B8A6);
      opacity: 0;
      transition: opacity 0.6s;
    }

    .enter-btn:hover {
      border-color: rgba(45, 212, 191, 0.6);
      transform: scale(1.02);
    }

    .enter-btn:hover::before { opacity: 0.15; }

    .enter-btn span { position: relative; z-index: 1; }

    /* ===== Dissolve Transition ===== */
    .dissolve-overlay {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none;
      opacity: 0;
    }
    .dissolve-overlay.active {
      pointer-events: all;
    }

    /* White flash wipe */
    .dissolve-flash {
      position: absolute; inset: 0;
      background: #fff;
      opacity: 0;
      transition: opacity 0.6s ease-in;
    }
    .dissolve-overlay.active .dissolve-flash {
      opacity: 1;
      transition-delay: 0.8s;
    }

    /* Content dissolve state */
    .intro-content.leaving {
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      filter: blur(12px) brightness(1.5);
      opacity: 0;
      transform: scale(1.06);
    }

    .intro-content.leaving .intro-logo {
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      filter: brightness(0) invert(1) blur(20px);
      opacity: 0;
      transform: scale(1.3);
    }

    .intro-content.leaving .intro-tagline {
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
      opacity: 0;
      transform: translateY(-20px);
      filter: blur(8px);
    }

    .intro-content.leaving .enter-btn {
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: scale(0.9);
      filter: blur(6px);
    }

    /* Particle canvas for dissolve */
    .dissolve-particles {
      position: fixed; inset: 0; z-index: 199;
      pointer-events: none;
    }

    /* Background dissolves too */
    .bg-flow.leaving {
      transition: filter 1s ease-in, opacity 1s ease-in;
      filter: blur(8px) brightness(2);
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

  <div class="bg-flow">
    <canvas id="flowCanvas"></canvas>
  </div>
  <div class="grain"></div>

  <!-- Loading Screen -->
  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-box">
      <img src="logo.png" alt="Shape" class="loader-logo">
      <div class="loader-track">
        <div class="loader-fill" id="loaderFill"></div>
      </div>
      <div class="loader-percent" id="loaderPercent">0</div>
      <div class="loader-label">Loading</div>
    </div>
  </div>

  <!-- Dissolve Transition Layers -->
  <canvas class="dissolve-particles" id="dissolveCanvas"></canvas>
  <div class="dissolve-overlay" id="dissolveOverlay">
    <div class="dissolve-flash"></div>
  </div>

  <div class="intro-content" id="introContent">
    <img src="logo.png" alt="Shape" class="intro-logo" id="introLogo">
    <p class="intro-tagline" id="introTagline">Your body. Your shape.</p>
    <a href="home.html" class="enter-btn" id="enterBtn" onclick="enterSite(event)">
      <span>Enter</span>
    </a>
  </div>

  <script>
    // Flowing mesh gradient animation
    const canvas = document.getElementById('flowCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Gradient orbs
    const orbs = [
      { x: 0.3, y: 0.3, r: 0.4, vx: 0.0003, vy: 0.0002, color: [45, 212, 191] },
      { x: 0.7, y: 0.6, r: 0.35, vx: -0.0002, vy: 0.0003, color: [20, 184, 166] },
      { x: 0.5, y: 0.8, r: 0.3, vx: 0.0004, vy: -0.0002, color: [59, 130, 246] },
      { x: 0.2, y: 0.6, r: 0.25, vx: -0.0003, vy: -0.0001, color: [139, 92, 246] },
      { x: 0.8, y: 0.2, r: 0.3, vx: 0.0001, vy: 0.0004, color: [45, 212, 191] },
    ];

    function draw() {
      time++;
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, w, h);

      orbs.forEach((orb, i) => {
        // Organic movement
        orb.x += orb.vx + Math.sin(time * 0.001 + i * 1.5) * 0.0002;
        orb.y += orb.vy + Math.cos(time * 0.0012 + i * 2) * 0.0002;

        // Wrap around
        if (orb.x < -0.2) orb.x = 1.2;
        if (orb.x > 1.2) orb.x = -0.2;
        if (orb.y < -0.2) orb.y = 1.2;
        if (orb.y > 1.2) orb.y = -0.2;

        const cx = orb.x * w;
        const cy = orb.y * h;
        const radius = orb.r * Math.min(w, h);

        const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        const [r, g, b] = orb.color;
        const pulse = 0.06 + Math.sin(time * 0.002 + i) * 0.02;
        gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${pulse})`);
        gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${pulse * 0.4})`);
        gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
      });

      // Flowing lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        const startY = (h / 8) * i + Math.sin(time * 0.003 + i) * 40;
        ctx.moveTo(0, startY);
        for (let x = 0; x <= w; x += 20) {
          const y = startY + Math.sin(x * 0.003 + time * 0.002 + i) * 60 + Math.cos(x * 0.001 + time * 0.001) * 30;
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    draw();

    // ===== Loading Sequence =====
    (function runLoader() {
      const fill = document.getElementById('loaderFill');
      const percent = document.getElementById('loaderPercent');
      const overlay = document.getElementById('loaderOverlay');
      let progress = 0;

      function tick() {
        // Variable speed — starts fast, slows in middle, accelerates at end
        let increment;
        if (progress < 30) {
          increment = Math.random() * 3 + 1.5;
        } else if (progress < 70) {
          increment = Math.random() * 2 + 0.5;
        } else if (progress < 90) {
          increment = Math.random() * 1.5 + 0.8;
        } else {
          increment = Math.random() * 3 + 2;
        }

        progress = Math.min(progress + increment, 100);
        const rounded = Math.floor(progress);
        fill.style.width = rounded + '%';
        percent.textContent = rounded;

        if (rounded < 100) {
          // Variable delay for organic feel
          const delay = progress < 30 ? 60 : progress < 70 ? 120 : progress < 90 ? 80 : 40;
          setTimeout(tick, delay + Math.random() * 60);
        } else {
          // Loading complete — transition out
          setTimeout(() => {
            overlay.classList.add('done');
            // Reveal intro content
            setTimeout(() => {
              document.getElementById('introLogo').classList.add('show');
              document.getElementById('introTagline').classList.add('show');
              document.getElementById('enterBtn').classList.add('show');
            }, 400);
          }, 500);
        }
      }

      // Start after brief pause
      setTimeout(tick, 600);
    })();

    // ===== Dissolve Transition =====
    function enterSite(e) {
      e.preventDefault();

      // 1. Spawn dissolve particles
      spawnDissolveParticles();

      // 2. Trigger content dissolve
      document.getElementById('introContent').classList.add('leaving');
      document.querySelector('.bg-flow').classList.add('leaving');

      // 3. Activate flash overlay
      setTimeout(() => {
        document.getElementById('dissolveOverlay').classList.add('active');
      }, 200);

      // 4. Fade out sound
      if (ambientPlaying && ambientNodes && ambientCtx) {
        ambientNodes.master.gain.cancelScheduledValues(ambientCtx.currentTime);
        ambientNodes.master.gain.setValueAtTime(ambientNodes.master.gain.value, ambientCtx.currentTime);
        ambientNodes.master.gain.linearRampToValueAtTime(0, ambientCtx.currentTime + 1.2);
      }

      // 5. Navigate after dissolve completes
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 1600);
    }

    // Dissolve particles effect
    function spawnDissolveParticles() {
      const dc = document.getElementById('dissolveCanvas');
      const dctx = dc.getContext('2d');
      dc.width = window.innerWidth;
      dc.height = window.innerHeight;

      const particles = [];
      const count = 120;

      // Spawn particles from center area
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
          x: dc.width / 2 + (Math.random() - 0.5) * 200,
          y: dc.height / 2 + (Math.random() - 0.5) * 150,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 3 + 0.5,
          alpha: Math.random() * 0.6 + 0.3,
          decay: Math.random() * 0.008 + 0.005,
          color: Math.random() > 0.5 ? '45,212,191' : '255,255,255',
        });
      }

      function animateParticles() {
        dctx.clearRect(0, 0, dc.width, dc.height);
        let alive = false;

        particles.forEach(p => {
          if (p.alpha <= 0) return;
          alive = true;

          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.99;
          p.vy *= 0.99;
          p.alpha -= p.decay;

          dctx.beginPath();
          dctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          dctx.fillStyle = `rgba(${p.color}, ${Math.max(0, p.alpha)})`;
          dctx.fill();
        });

        if (alive) requestAnimationFrame(animateParticles);
      }

      animateParticles();
    }
  </script>

  <!-- Ambient Sound Toggle -->
  <div id="soundToggle" style="position:fixed;bottom:24px;right:24px;z-index:100;cursor:pointer;opacity:0.3;transition:opacity 0.3s;" onclick="toggleAmbient()">
    <span id="soundIcon" style="font-size:0.65rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:#666;">Sound Off</span>
  </div>

  <script>
  // ===== Ambient Background Hum =====
  let ambientCtx = null;
  let ambientNodes = null;
  let ambientPlaying = false;
  const AMB_VOL = 1.0;

  function createAmbient() {
    ambientCtx = new (window.AudioContext || window.webkitAudioContext)();
    const master = ambientCtx.createGain();
    master.gain.value = 0;

    // Master compressor to glue everything and add weight
    const comp = ambientCtx.createDynamicsCompressor();
    comp.threshold.value = -12;
    comp.knee.value = 10;
    comp.ratio.value = 4;
    comp.attack.value = 0.05;
    comp.release.value = 0.25;
    master.connect(comp);
    comp.connect(ambientCtx.destination);

    // =========================================
    // LAYER 1: DEEP BASS DRONE (the foundation)
    // =========================================

    // Primary sub drone — 28Hz, barely audible, felt in chest
    const drone1 = ambientCtx.createOscillator();
    const drone1G = ambientCtx.createGain();
    drone1.type = 'sine';
    drone1.frequency.value = 28;
    drone1G.gain.value = 0.9;
    drone1.connect(drone1G);
    drone1G.connect(master);
    drone1.start();

    // Second drone layer — 42Hz, adds grit
    const drone2 = ambientCtx.createOscillator();
    const drone2G = ambientCtx.createGain();
    drone2.type = 'sawtooth';
    drone2.frequency.value = 42;
    drone2G.gain.value = 0.5;
    const drone2F = ambientCtx.createBiquadFilter();
    drone2F.type = 'lowpass';
    drone2F.frequency.value = 90;
    drone2F.Q.value = 6;
    drone2.connect(drone2F);
    drone2F.connect(drone2G);
    drone2G.connect(master);
    drone2.start();

    // Third drone — 56Hz square wave, filtered heavy, adds rumble texture
    const drone3 = ambientCtx.createOscillator();
    const drone3G = ambientCtx.createGain();
    drone3.type = 'square';
    drone3.frequency.value = 56;
    drone3G.gain.value = 0.3;
    const drone3F = ambientCtx.createBiquadFilter();
    drone3F.type = 'lowpass';
    drone3F.frequency.value = 70;
    drone3F.Q.value = 10;
    drone3.connect(drone3F);
    drone3F.connect(drone3G);
    drone3G.connect(master);
    drone3.start();

    // =========================================
    // LAYER 2: SCI-FI ENGINE
    // =========================================

    // Engine core — detuned sawtooth pair for thick sci-fi texture
    const eng1 = ambientCtx.createOscillator();
    const eng1G = ambientCtx.createGain();
    eng1.type = 'sawtooth';
    eng1.frequency.value = 36;
    eng1G.gain.value = 0.35;
    const eng1F = ambientCtx.createBiquadFilter();
    eng1F.type = 'lowpass';
    eng1F.frequency.value = 140;
    eng1F.Q.value = 12; // High resonance — sci-fi character
    eng1.connect(eng1F);
    eng1F.connect(eng1G);
    eng1G.connect(master);
    eng1.start();

    const eng2 = ambientCtx.createOscillator();
    const eng2G = ambientCtx.createGain();
    eng2.type = 'sawtooth';
    eng2.frequency.value = 36.8; // Slightly detuned — creates beating/thickness
    eng2G.gain.value = 0.35;
    const eng2F = ambientCtx.createBiquadFilter();
    eng2F.type = 'lowpass';
    eng2F.frequency.value = 140;
    eng2F.Q.value = 12;
    eng2.connect(eng2F);
    eng2F.connect(eng2G);
    eng2G.connect(master);
    eng2.start();

    // Reactor tone — distant sci-fi hum, bandpassed for that "power core" feel
    const reactor = ambientCtx.createOscillator();
    const reactorG = ambientCtx.createGain();
    reactor.type = 'sawtooth';
    reactor.frequency.value = 150;
    reactorG.gain.value = 0.12;
    const reactorF = ambientCtx.createBiquadFilter();
    reactorF.type = 'bandpass';
    reactorF.frequency.value = 150;
    reactorF.Q.value = 20; // Very narrow — eerie resonant tone
    reactor.connect(reactorF);
    reactorF.connect(reactorG);
    reactorG.connect(master);
    reactor.start();

    // High-frequency sci-fi whine — very quiet, adds "electronic" feel
    const scifi = ambientCtx.createOscillator();
    const scifiG = ambientCtx.createGain();
    scifi.type = 'sine';
    scifi.frequency.value = 320;
    scifiG.gain.value = 0.035;
    const scifiF = ambientCtx.createBiquadFilter();
    scifiF.type = 'bandpass';
    scifiF.frequency.value = 320;
    scifiF.Q.value = 30;
    scifi.connect(scifiF);
    scifiF.connect(scifiG);
    scifiG.connect(master);
    scifi.start();

    // =========================================
    // LAYER 3: MOVEMENT & LIFE (LFOs)
    // =========================================

    // Slow drone pitch drift — makes it feel alive
    const driftLfo = ambientCtx.createOscillator();
    const driftLfoG = ambientCtx.createGain();
    driftLfo.type = 'sine';
    driftLfo.frequency.value = 0.03; // Very slow
    driftLfoG.gain.value = 4;
    driftLfo.connect(driftLfoG);
    driftLfoG.connect(drone1.frequency);
    driftLfoG.connect(drone2.frequency);
    driftLfo.start();

    // Engine filter sweep — sci-fi wah effect
    const sweepLfo = ambientCtx.createOscillator();
    const sweepLfoG = ambientCtx.createGain();
    sweepLfo.type = 'sine';
    sweepLfo.frequency.value = 0.07;
    sweepLfoG.gain.value = 30;
    sweepLfo.connect(sweepLfoG);
    sweepLfoG.connect(eng1F.frequency);
    sweepLfoG.connect(eng2F.frequency);
    sweepLfo.start();

    // Volume throb — engine idle pulse
    const throbLfo = ambientCtx.createOscillator();
    const throbLfoG = ambientCtx.createGain();
    throbLfo.type = 'sine';
    throbLfo.frequency.value = 0.25;
    throbLfoG.gain.value = 0.1;
    throbLfo.connect(throbLfoG);
    throbLfoG.connect(master.gain);
    throbLfo.start();

    // Reactor warble
    const warble = ambientCtx.createOscillator();
    const warbleG = ambientCtx.createGain();
    warble.type = 'sine';
    warble.frequency.value = 0.5;
    warbleG.gain.value = 5;
    warble.connect(warbleG);
    warbleG.connect(reactor.frequency);
    warble.start();

    // =========================================
    // LAYER 4: NOISE — rumble & atmosphere
    // =========================================

    const noiseLen = ambientCtx.sampleRate * 4;
    const noiseBuf = ambientCtx.createBuffer(1, noiseLen, ambientCtx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) nd[i] = Math.random() * 2 - 1;

    // Heavy low rumble noise
    const rumble = ambientCtx.createBufferSource();
    rumble.buffer = noiseBuf;
    rumble.loop = true;
    const rumbleF = ambientCtx.createBiquadFilter();
    rumbleF.type = 'lowpass';
    rumbleF.frequency.value = 100;
    rumbleF.Q.value = 3;
    const rumbleG = ambientCtx.createGain();
    rumbleG.gain.value = 0.4;
    rumble.connect(rumbleF);
    rumbleF.connect(rumbleG);
    rumbleG.connect(master);
    rumble.start();

    // Mid-range engine noise — gives width
    const engineNoise = ambientCtx.createBufferSource();
    engineNoise.buffer = noiseBuf;
    engineNoise.loop = true;
    const engineNoiseF = ambientCtx.createBiquadFilter();
    engineNoiseF.type = 'bandpass';
    engineNoiseF.frequency.value = 250;
    engineNoiseF.Q.value = 2;
    const engineNoiseG = ambientCtx.createGain();
    engineNoiseG.gain.value = 0.1;
    engineNoise.connect(engineNoiseF);
    engineNoiseF.connect(engineNoiseG);
    engineNoiseG.connect(master);
    engineNoise.start();

    // Rumble modulation — noise level breathes
    const rumbleLfo = ambientCtx.createOscillator();
    const rumbleLfoG = ambientCtx.createGain();
    rumbleLfo.type = 'sine';
    rumbleLfo.frequency.value = 0.1;
    rumbleLfoG.gain.value = 0.1;
    rumbleLfo.connect(rumbleLfoG);
    rumbleLfoG.connect(rumbleG.gain);
    rumbleLfo.start();

    // Fade in over 6 seconds
    master.gain.setValueAtTime(0, ambientCtx.currentTime);
    master.gain.linearRampToValueAtTime(AMB_VOL, ambientCtx.currentTime + 6);

    ambientNodes = { master };
  }

  async function startSound() {
    if (!ambientCtx) createAmbient();
    // Force resume — browsers require user gesture to unlock
    if (ambientCtx.state === 'suspended') {
      await ambientCtx.resume();
    }
    ambientNodes.master.gain.cancelScheduledValues(ambientCtx.currentTime);
    ambientNodes.master.gain.setValueAtTime(ambientNodes.master.gain.value, ambientCtx.currentTime);
    ambientNodes.master.gain.linearRampToValueAtTime(AMB_VOL, ambientCtx.currentTime + 2);
    document.getElementById('soundIcon').textContent = 'Sound On';
    document.getElementById('soundToggle').style.opacity = '0.7';
    ambientPlaying = true;
  }

  function stopSound() {
    if (!ambientCtx || !ambientNodes) return;
    ambientNodes.master.gain.cancelScheduledValues(ambientCtx.currentTime);
    ambientNodes.master.gain.setValueAtTime(ambientNodes.master.gain.value, ambientCtx.currentTime);
    ambientNodes.master.gain.linearRampToValueAtTime(0, ambientCtx.currentTime + 1);
    document.getElementById('soundIcon').textContent = 'Sound Off';
    document.getElementById('soundToggle').style.opacity = '0.3';
    ambientPlaying = false;
  }

  function toggleAmbient() {
    if (!ambientPlaying) {
      startSound();
    } else {
      stopSound();
    }
  }

  // Auto-start on first user interaction
  let ambientStarted = false;
  function initAmbient() {
    if (ambientStarted) return;
    ambientStarted = true;
    startSound();
    // Clean up all listeners
    ['click','touchstart','mousemove','mousedown','keydown','scroll','touchmove','pointerdown'].forEach(evt => {
      document.removeEventListener(evt, initAmbient);
    });
  }

  // Register listeners for first interaction
  ['click','touchstart','mousemove','mousedown','keydown','scroll','touchmove','pointerdown'].forEach(evt => {
    document.addEventListener(evt, initAmbient, { once: false });
  });
  </script>

  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
