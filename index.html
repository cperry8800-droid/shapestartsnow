<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Flowing gradient background */
    .bg-flow {
      position: fixed; inset: 0; z-index: 0;
    }

    .bg-flow canvas {
      width: 100%; height: 100%;
    }

    /* Grain overlay */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* Content */
    .intro-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; width: 100%;
      text-align: center;
    }

    /* ===== Loading Screen ===== */
    .loader-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .loader-overlay.done {
      opacity: 0;
      pointer-events: none;
    }

    .loader-box {
      display: flex; flex-direction: column;
      align-items: center; gap: 32px;
    }

    .loader-logo {
      height: 80px; width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.4;
    }

    .loader-track {
      width: 220px; height: 1px;
      background: rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .loader-fill {
      position: absolute; left: 0; top: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(45,212,191,0.6), #2DD4BF);
      transition: width 0.15s linear;
    }

    .loader-percent {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
    }

    .loader-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    .intro-logo {
      height: 140px; width: auto;
      margin-bottom: 48px;
      filter: brightness(0) invert(1);
      opacity: 0;
    }
    .intro-logo.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 logoPulse 2.5s ease-in-out 1.2s infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 1; filter: brightness(0) invert(1) drop-shadow(0 0 12px rgba(45, 212, 191, 0.4)); }
      50% { opacity: 0.15; filter: brightness(0) invert(1) drop-shadow(0 0 0px rgba(45, 212, 191, 0)); }
    }

    .intro-tagline {
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 64px;
      opacity: 0;
    }
    .intro-tagline.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .enter-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 18px 64px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      pointer-events: none;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .enter-btn.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      pointer-events: auto;
    }

    .enter-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #2DD4BF, #14B8A6);
      opacity: 0;
      transition: opacity 0.6s;
    }

    .enter-btn:hover {
      border-color: rgba(45, 212, 191, 0.6);
      transform: scale(1.02);
    }

    .enter-btn:hover::before { opacity: 0.15; }

    .enter-btn span { position: relative; z-index: 1; }

    /* ===== Dissolve Transition ===== */
    .dissolve-overlay {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none;
      opacity: 0;
    }
    .dissolve-overlay.active {
      pointer-events: all;
    }

    /* Black fade out */
    .dissolve-flash {
      position: absolute; inset: 0;
      background: #0a0a0a;
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 1, 1);
    }
    .dissolve-overlay.active .dissolve-flash {
      opacity: 1;
      transition-delay: 0.3s;
    }

    /* Content dissolve state */
    .intro-content.leaving {
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      filter: blur(12px) brightness(1.5);
      opacity: 0;
      transform: scale(1.06);
    }

    .intro-content.leaving .intro-logo {
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      filter: brightness(0) invert(1) blur(20px);
      opacity: 0;
      transform: scale(1.3);
    }

    .intro-content.leaving .intro-tagline {
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
      opacity: 0;
      transform: translateY(-20px);
      filter: blur(8px);
    }

    .intro-content.leaving .enter-btn {
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: scale(0.9);
      filter: blur(6px);
    }

    /* Particle canvas for dissolve */
    .dissolve-particles {
      position: fixed; inset: 0; z-index: 199;
      pointer-events: none;
    }

    /* Background dissolves too */
    .bg-flow.leaving {
      transition: filter 1s ease-in, opacity 1s ease-in;
      filter: blur(8px) brightness(2);
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

  <div class="bg-flow">
    <canvas id="flowCanvas"></canvas>
  </div>
  <div class="grain"></div>

  <!-- Loading Screen -->
  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-box">
      <img src="logo.png" alt="Shape" class="loader-logo">
      <div class="loader-track">
        <div class="loader-fill" id="loaderFill"></div>
      </div>
      <div class="loader-percent" id="loaderPercent">0</div>
      <div class="loader-label">Loading</div>
    </div>
  </div>

  <!-- Dissolve Transition Layers -->
  <canvas class="dissolve-particles" id="dissolveCanvas"></canvas>
  <div class="dissolve-overlay" id="dissolveOverlay">
    <div class="dissolve-flash"></div>
  </div>

  <div class="intro-content" id="introContent">
    <img src="logo.png" alt="Shape" class="intro-logo" id="introLogo">
    <p class="intro-tagline" id="introTagline">Your body. Your shape.</p>
    <a href="home.html" class="enter-btn" id="enterBtn" onclick="enterSite(event)">
      <span>Enter</span>
    </a>
  </div>

  <script>
    // Flowing mesh gradient animation
    const canvas = document.getElementById('flowCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Gradient orbs
    const orbs = [
      { x: 0.3, y: 0.3, r: 0.4, vx: 0.0003, vy: 0.0002, color: [45, 212, 191] },
      { x: 0.7, y: 0.6, r: 0.35, vx: -0.0002, vy: 0.0003, color: [20, 184, 166] },
      { x: 0.5, y: 0.8, r: 0.3, vx: 0.0004, vy: -0.0002, color: [59, 130, 246] },
      { x: 0.2, y: 0.6, r: 0.25, vx: -0.0003, vy: -0.0001, color: [139, 92, 246] },
      { x: 0.8, y: 0.2, r: 0.3, vx: 0.0001, vy: 0.0004, color: [45, 212, 191] },
    ];

    function draw() {
      time++;
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, w, h);

      orbs.forEach((orb, i) => {
        // Organic movement
        orb.x += orb.vx + Math.sin(time * 0.001 + i * 1.5) * 0.0002;
        orb.y += orb.vy + Math.cos(time * 0.0012 + i * 2) * 0.0002;

        // Wrap around
        if (orb.x < -0.2) orb.x = 1.2;
        if (orb.x > 1.2) orb.x = -0.2;
        if (orb.y < -0.2) orb.y = 1.2;
        if (orb.y > 1.2) orb.y = -0.2;

        const cx = orb.x * w;
        const cy = orb.y * h;
        const radius = orb.r * Math.min(w, h);

        const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        const [r, g, b] = orb.color;
        const pulse = 0.06 + Math.sin(time * 0.002 + i) * 0.02;
        gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${pulse})`);
        gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${pulse * 0.4})`);
        gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
      });

      // Flowing lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        const startY = (h / 8) * i + Math.sin(time * 0.003 + i) * 40;
        ctx.moveTo(0, startY);
        for (let x = 0; x <= w; x += 20) {
          const y = startY + Math.sin(x * 0.003 + time * 0.002 + i) * 60 + Math.cos(x * 0.001 + time * 0.001) * 30;
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    draw();

    // ===== Loading Sequence =====
    (function runLoader() {
      const fill = document.getElementById('loaderFill');
      const percent = document.getElementById('loaderPercent');
      const overlay = document.getElementById('loaderOverlay');
      let progress = 0;

      function tick() {
        // Variable speed — starts fast, slows in middle, accelerates at end
        let increment;
        if (progress < 30) {
          increment = Math.random() * 3 + 1.5;
        } else if (progress < 70) {
          increment = Math.random() * 2 + 0.5;
        } else if (progress < 90) {
          increment = Math.random() * 1.5 + 0.8;
        } else {
          increment = Math.random() * 3 + 2;
        }

        progress = Math.min(progress + increment, 100);
        const rounded = Math.floor(progress);
        fill.style.width = rounded + '%';
        percent.textContent = rounded;

        if (rounded < 100) {
          // Variable delay for organic feel
          const delay = progress < 30 ? 60 : progress < 70 ? 120 : progress < 90 ? 80 : 40;
          setTimeout(tick, delay + Math.random() * 60);
        } else {
          // Loading complete — transition out
          setTimeout(() => {
            overlay.classList.add('done');
            // Crossfade: dial-up → deep rumble
            if (typeof crossfadeToRumble === 'function') crossfadeToRumble();
            // Reveal intro content
            setTimeout(() => {
              document.getElementById('introLogo').classList.add('show');
              document.getElementById('introTagline').classList.add('show');
              document.getElementById('enterBtn').classList.add('show');
            }, 400);
          }, 500);
        }
      }

      // Start after brief pause
      setTimeout(tick, 600);
    })();

    // ===== Dissolve Transition =====
    function enterSite(e) {
      e.preventDefault();

      // 1. Spawn dissolve particles
      spawnDissolveParticles();

      // 2. Trigger content dissolve
      document.getElementById('introContent').classList.add('leaving');
      document.querySelector('.bg-flow').classList.add('leaving');

      // 3. Activate flash overlay
      setTimeout(() => {
        document.getElementById('dissolveOverlay').classList.add('active');
      }, 200);

      // 4. Fade out sound
      if (audioCtx && ambientNodes) {
        const t = audioCtx.currentTime;
        ambientNodes.master.gain.cancelScheduledValues(t);
        ambientNodes.master.gain.setValueAtTime(ambientNodes.master.gain.value, t);
        ambientNodes.master.gain.linearRampToValueAtTime(0, t + 1.4);
      }

      // 5. Navigate after dissolve completes (black overlay fully covering)
      setTimeout(() => {
        window.location.href = 'home.html?from=intro';
      }, 1500);
    }

    // Dissolve particles effect
    function spawnDissolveParticles() {
      const dc = document.getElementById('dissolveCanvas');
      const dctx = dc.getContext('2d');
      dc.width = window.innerWidth;
      dc.height = window.innerHeight;

      const particles = [];
      const count = 120;

      // Spawn particles from center area
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
          x: dc.width / 2 + (Math.random() - 0.5) * 200,
          y: dc.height / 2 + (Math.random() - 0.5) * 150,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 3 + 0.5,
          alpha: Math.random() * 0.6 + 0.3,
          decay: Math.random() * 0.008 + 0.005,
          color: Math.random() > 0.5 ? '45,212,191' : '255,255,255',
        });
      }

      function animateParticles() {
        dctx.clearRect(0, 0, dc.width, dc.height);
        let alive = false;

        particles.forEach(p => {
          if (p.alpha <= 0) return;
          alive = true;

          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.99;
          p.vy *= 0.99;
          p.alpha -= p.decay;

          dctx.beginPath();
          dctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          dctx.fillStyle = `rgba(${p.color}, ${Math.max(0, p.alpha)})`;
          dctx.fill();
        });

        if (alive) requestAnimationFrame(animateParticles);
      }

      animateParticles();
    }
  </script>

  <!-- Ambient Sound Toggle -->
  <div id="soundToggle" style="position:fixed;bottom:24px;right:24px;z-index:100;cursor:pointer;opacity:0.3;transition:opacity 0.3s;" onclick="toggleAmbient()">
    <span id="soundIcon" style="font-size:0.65rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:#666;">Sound Off</span>
  </div>

  <script>
  // ===== AUDIO ENGINE =====
  let audioCtx = null;
  let dialUpNodes = null;
  let ambientNodes = null;
  let ambientPlaying = false;
  let dialUpPlaying = false;
  const AMB_VOL = 1.0;
  const DIALUP_VOL = 0.35;

  function ensureAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  // =============================================
  // DIAL-UP MODEM SOUND — authentic V.90 style
  // All sine waves, real modem frequencies
  // =============================================
  function tone(ctx, dest, freq, start, dur, vol) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.012);
    g.gain.setValueAtTime(vol, start + dur - 0.015);
    g.gain.linearRampToValueAtTime(0, start + dur);
    osc.connect(g); g.connect(dest);
    osc.start(start); osc.stop(start + dur + 0.02);
  }

  function sweep(ctx, dest, f1, f2, start, dur, vol) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f1, start);
    osc.frequency.exponentialRampToValueAtTime(f2, start + dur);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.015);
    g.gain.setValueAtTime(vol, start + dur - 0.02);
    g.gain.linearRampToValueAtTime(0, start + dur);
    osc.connect(g); g.connect(dest);
    osc.start(start); osc.stop(start + dur + 0.02);
  }

  function createDialUp() {
    const ctx = ensureAudioCtx();
    const t = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.value = 0;
    master.connect(ctx.destination);

    // ── Phase 1: US dial tone (350Hz + 440Hz) ──
    tone(ctx, master, 350, t + 0.1, 0.9, 0.13);
    tone(ctx, master, 440, t + 0.1, 0.9, 0.13);

    // ── Phase 2: DTMF dialing — 10 digits ──
    const digits = [
      [697,1209],[941,1336],[697,1477],[770,1209],[852,1336],
      [697,1209],[770,1477],[941,1209],[697,1336],[852,1477]
    ];
    digits.forEach(([r,c], i) => {
      const s = t + 1.15 + i * 0.17;
      tone(ctx, master, r, s, 0.11, 0.12);
      tone(ctx, master, c, s, 0.11, 0.12);
    });

    // ── Phase 3: Phone ring (440Hz + 480Hz, 2 bursts) ──
    [440, 480].forEach(f => {
      tone(ctx, master, f, t + 3.0, 1.0, 0.09);
      tone(ctx, master, f, t + 4.5, 1.0, 0.09);
    });

    // ── Phase 4: Remote modem answers — 2100Hz ANSam carrier ──
    // 2100Hz sine with gentle 15Hz AM modulation (authentic V.90)
    const ansOsc = ctx.createOscillator();
    const ansG   = ctx.createGain();
    ansOsc.type = 'sine'; ansOsc.frequency.value = 2100;
    const amOsc  = ctx.createOscillator();
    const amG    = ctx.createGain();
    amOsc.type = 'sine'; amOsc.frequency.value = 15;
    amG.gain.value = 0.04;
    amOsc.connect(amG); amG.connect(ansG.gain);
    ansG.gain.setValueAtTime(0, t + 5.7);
    ansG.gain.linearRampToValueAtTime(0.14, t + 5.8);
    ansG.gain.setValueAtTime(0.14, t + 6.5);
    ansG.gain.linearRampToValueAtTime(0, t + 6.6);
    ansOsc.connect(ansG); ansG.connect(master);
    ansOsc.start(t + 5.7); ansOsc.stop(t + 6.7);
    amOsc.start(t + 5.7);  amOsc.stop(t + 6.7);

    // Local modem responds with 1300Hz
    tone(ctx, master, 1300, t + 6.6, 0.4, 0.11);

    // ── Phase 5: V.34 Waterfall — the iconic cascading sweeps ──
    // Rapid sine sweeps from ~3200Hz down to ~300Hz, overlapping
    const wf = t + 7.1;
    for (let i = 0; i < 12; i++) {
      sweep(ctx, master, 3100 - i*30, 310 + i*10, wf + i*0.27, 0.24, 0.10);
    }
    // Counter-sweeps (quieter, ascending, overlapping) — gives the "two modems talking" feel
    for (let i = 0; i < 10; i++) {
      sweep(ctx, master, 350 + i*20, 2800 - i*40, wf + 0.13 + i*0.27, 0.22, 0.05);
    }

    // ── Phase 6: Training tones — "bong bong bong" alternating tones ──
    const tr = t + 10.5;
    for (let i = 0; i < 28; i++) {
      tone(ctx, master, i % 2 === 0 ? 1200 : 2400, tr + i * 0.14, 0.11, 0.09);
    }

    // ── Phase 7: Soft phone-line hiss underneath (no robot static) ──
    const noiseLen = ctx.sampleRate * 2;
    const noiseBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) nd[i] = Math.random() * 2 - 1;
    const hiss = ctx.createBufferSource();
    hiss.buffer = noiseBuf; hiss.loop = true;
    const hissF = ctx.createBiquadFilter();
    hissF.type = 'highpass'; hissF.frequency.value = 1800;
    const hissG = ctx.createGain();
    hissG.gain.setValueAtTime(0, t + 7.0);
    hissG.gain.linearRampToValueAtTime(0.018, t + 7.5);
    hiss.connect(hissF); hissF.connect(hissG); hissG.connect(master);
    hiss.start(t + 7.0);

    // Fade master in
    master.gain.setValueAtTime(0, t);
    master.gain.linearRampToValueAtTime(DIALUP_VOL, t + 0.2);

    dialUpNodes = { master, hiss };
    dialUpPlaying = true;
  }

  function fadeOutDialUp(duration) {
    if (!dialUpNodes || !audioCtx) return;
    const t = audioCtx.currentTime;
    dialUpNodes.master.gain.cancelScheduledValues(t);
    dialUpNodes.master.gain.setValueAtTime(dialUpNodes.master.gain.value, t);
    dialUpNodes.master.gain.linearRampToValueAtTime(0, t + duration);
    setTimeout(() => {
      try { dialUpNodes.hiss.stop(); } catch(e) {}
      dialUpPlaying = false;
    }, duration * 1000 + 100);
  }

  // =============================================
  // DEEP RUMBLE AMBIENT (plays after loading)
  // =============================================
  function createAmbient() {
    const ctx = ensureAudioCtx();
    const master = ctx.createGain();
    master.gain.value = 0;

    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -12;
    comp.knee.value = 10;
    comp.ratio.value = 4;
    comp.attack.value = 0.05;
    comp.release.value = 0.25;
    master.connect(comp);
    comp.connect(ctx.destination);

    // LAYER 1: DEEP BASS DRONE
    const drone1 = ctx.createOscillator();
    const drone1G = ctx.createGain();
    drone1.type = 'sine'; drone1.frequency.value = 28; drone1G.gain.value = 0.9;
    drone1.connect(drone1G); drone1G.connect(master); drone1.start();

    const drone2 = ctx.createOscillator();
    const drone2G = ctx.createGain();
    drone2.type = 'sawtooth'; drone2.frequency.value = 42; drone2G.gain.value = 0.5;
    const drone2F = ctx.createBiquadFilter();
    drone2F.type = 'lowpass'; drone2F.frequency.value = 90; drone2F.Q.value = 6;
    drone2.connect(drone2F); drone2F.connect(drone2G); drone2G.connect(master); drone2.start();

    const drone3 = ctx.createOscillator();
    const drone3G = ctx.createGain();
    drone3.type = 'square'; drone3.frequency.value = 56; drone3G.gain.value = 0.3;
    const drone3F = ctx.createBiquadFilter();
    drone3F.type = 'lowpass'; drone3F.frequency.value = 70; drone3F.Q.value = 10;
    drone3.connect(drone3F); drone3F.connect(drone3G); drone3G.connect(master); drone3.start();

    // LAYER 2: SCI-FI ENGINE
    const eng1 = ctx.createOscillator();
    const eng1G = ctx.createGain();
    eng1.type = 'sawtooth'; eng1.frequency.value = 36; eng1G.gain.value = 0.35;
    const eng1F = ctx.createBiquadFilter();
    eng1F.type = 'lowpass'; eng1F.frequency.value = 140; eng1F.Q.value = 12;
    eng1.connect(eng1F); eng1F.connect(eng1G); eng1G.connect(master); eng1.start();

    const eng2 = ctx.createOscillator();
    const eng2G = ctx.createGain();
    eng2.type = 'sawtooth'; eng2.frequency.value = 36.8; eng2G.gain.value = 0.35;
    const eng2F = ctx.createBiquadFilter();
    eng2F.type = 'lowpass'; eng2F.frequency.value = 140; eng2F.Q.value = 12;
    eng2.connect(eng2F); eng2F.connect(eng2G); eng2G.connect(master); eng2.start();

    const reactor = ctx.createOscillator();
    const reactorG = ctx.createGain();
    reactor.type = 'sawtooth'; reactor.frequency.value = 150; reactorG.gain.value = 0.12;
    const reactorF = ctx.createBiquadFilter();
    reactorF.type = 'bandpass'; reactorF.frequency.value = 150; reactorF.Q.value = 20;
    reactor.connect(reactorF); reactorF.connect(reactorG); reactorG.connect(master); reactor.start();

    const scifi = ctx.createOscillator();
    const scifiG = ctx.createGain();
    scifi.type = 'sine'; scifi.frequency.value = 320; scifiG.gain.value = 0.035;
    const scifiF = ctx.createBiquadFilter();
    scifiF.type = 'bandpass'; scifiF.frequency.value = 320; scifiF.Q.value = 30;
    scifi.connect(scifiF); scifiF.connect(scifiG); scifiG.connect(master); scifi.start();

    // LAYER 3: LFOs
    const driftLfo = ctx.createOscillator();
    const driftLfoG = ctx.createGain();
    driftLfo.type = 'sine'; driftLfo.frequency.value = 0.03; driftLfoG.gain.value = 4;
    driftLfo.connect(driftLfoG);
    driftLfoG.connect(drone1.frequency); driftLfoG.connect(drone2.frequency);
    driftLfo.start();

    const sweepLfo = ctx.createOscillator();
    const sweepLfoG = ctx.createGain();
    sweepLfo.type = 'sine'; sweepLfo.frequency.value = 0.07; sweepLfoG.gain.value = 30;
    sweepLfo.connect(sweepLfoG);
    sweepLfoG.connect(eng1F.frequency); sweepLfoG.connect(eng2F.frequency);
    sweepLfo.start();

    const throbLfo = ctx.createOscillator();
    const throbLfoG = ctx.createGain();
    throbLfo.type = 'sine'; throbLfo.frequency.value = 0.25; throbLfoG.gain.value = 0.1;
    throbLfo.connect(throbLfoG); throbLfoG.connect(master.gain); throbLfo.start();

    const warble = ctx.createOscillator();
    const warbleG = ctx.createGain();
    warble.type = 'sine'; warble.frequency.value = 0.5; warbleG.gain.value = 5;
    warble.connect(warbleG); warbleG.connect(reactor.frequency); warble.start();

    // LAYER 4: NOISE
    const noiseLen = ctx.sampleRate * 4;
    const noiseBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) nd[i] = Math.random() * 2 - 1;

    const rumble = ctx.createBufferSource();
    rumble.buffer = noiseBuf; rumble.loop = true;
    const rumbleF = ctx.createBiquadFilter();
    rumbleF.type = 'lowpass'; rumbleF.frequency.value = 100; rumbleF.Q.value = 3;
    const rumbleG = ctx.createGain(); rumbleG.gain.value = 0.4;
    rumble.connect(rumbleF); rumbleF.connect(rumbleG); rumbleG.connect(master); rumble.start();

    const engineNoise = ctx.createBufferSource();
    engineNoise.buffer = noiseBuf; engineNoise.loop = true;
    const engineNoiseF = ctx.createBiquadFilter();
    engineNoiseF.type = 'bandpass'; engineNoiseF.frequency.value = 250; engineNoiseF.Q.value = 2;
    const engineNoiseG = ctx.createGain(); engineNoiseG.gain.value = 0.1;
    engineNoise.connect(engineNoiseF); engineNoiseF.connect(engineNoiseG); engineNoiseG.connect(master); engineNoise.start();

    const rumbleLfo = ctx.createOscillator();
    const rumbleLfoG = ctx.createGain();
    rumbleLfo.type = 'sine'; rumbleLfo.frequency.value = 0.1; rumbleLfoG.gain.value = 0.1;
    rumbleLfo.connect(rumbleLfoG); rumbleLfoG.connect(rumbleG.gain); rumbleLfo.start();

    ambientNodes = { master };
  }

  // Crossfade: dial-up out, rumble in
  function crossfadeToRumble() {
    // Fade out dial-up over 1.5s
    fadeOutDialUp(1.5);
    // Create and fade in rumble
    if (!ambientNodes) createAmbient();
    const t = audioCtx.currentTime;
    ambientNodes.master.gain.setValueAtTime(0, t);
    ambientNodes.master.gain.linearRampToValueAtTime(AMB_VOL, t + 3);
    document.getElementById('soundIcon').textContent = 'Sound On';
    document.getElementById('soundToggle').style.opacity = '0.7';
    ambientPlaying = true;
  }

  function toggleAmbient() {
    if (!ambientPlaying) {
      if (!audioCtx) ensureAudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (!ambientNodes) createAmbient();
      const t = audioCtx.currentTime;
      ambientNodes.master.gain.cancelScheduledValues(t);
      ambientNodes.master.gain.setValueAtTime(ambientNodes.master.gain.value, t);
      ambientNodes.master.gain.linearRampToValueAtTime(AMB_VOL, t + 2);
      document.getElementById('soundIcon').textContent = 'Sound On';
      document.getElementById('soundToggle').style.opacity = '0.7';
      ambientPlaying = true;
    } else {
      if (!audioCtx || !ambientNodes) return;
      const t = audioCtx.currentTime;
      ambientNodes.master.gain.cancelScheduledValues(t);
      ambientNodes.master.gain.setValueAtTime(ambientNodes.master.gain.value, t);
      ambientNodes.master.gain.linearRampToValueAtTime(0, t + 1);
      document.getElementById('soundIcon').textContent = 'Sound Off';
      document.getElementById('soundToggle').style.opacity = '0.3';
      ambientPlaying = false;
    }
  }

  // Start dial-up on first user interaction
  let audioStarted = false;
  const AUDIO_EVENTS = ['click','touchstart','touchend','mousedown','keydown','pointerdown'];

  function initAudio() {
    if (audioStarted) return;
    audioStarted = true;

    // Remove listeners immediately
    AUDIO_EVENTS.forEach(evt => {
      window.removeEventListener(evt, initAudio, true);
    });

    try {
      const ctx = ensureAudioCtx();
      const start = () => {
        try { createDialUp(); } catch(e) { console.warn('dial-up error:', e); }
      };
      if (ctx.state === 'suspended') {
        ctx.resume().then(start).catch(start);
      } else {
        start();
      }
    } catch(e) {
      console.warn('audio init error:', e);
    }
  }

  // Use capture phase on window — fires before anything else
  AUDIO_EVENTS.forEach(evt => {
    window.addEventListener(evt, initAudio, { capture: true, passive: true });
  });
  </script>

  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
