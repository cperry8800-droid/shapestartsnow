<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Flowing gradient background */
    .bg-flow {
      position: fixed; inset: 0; z-index: 0;
    }

    .bg-flow canvas {
      width: 100%; height: 100%;
    }

    /* Grain overlay */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* Content */
    .intro-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; width: 100%;
      text-align: center;
    }

    /* ===== Loading Screen ===== */
    .loader-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .loader-overlay.done {
      opacity: 0;
      pointer-events: none;
    }

    .loader-box {
      display: flex; flex-direction: column;
      align-items: center; gap: 32px;
    }

    .loader-logo {
      height: 140px; width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.4;
    }

    .loader-track {
      width: 220px; height: 1px;
      background: rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .loader-fill {
      position: absolute; left: 0; top: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(45,212,191,0.6), #2DD4BF);
      transition: width 0.15s linear;
    }

    .loader-percent {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
    }

    .loader-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }

    .intro-logo {
      height: 140px; width: auto;
      margin-bottom: 48px;
      filter: brightness(0) invert(1);
      opacity: 0;
    }
    .intro-logo.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 logoPulse 2.5s ease-in-out 1.5s infinite;
      filter: brightness(0) invert(1);
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    .intro-tagline {
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 64px;
      opacity: 0;
    }
    .intro-tagline.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .enter-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 18px 64px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      pointer-events: none;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .enter-btn.show {
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      pointer-events: auto;
    }

    .enter-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #2DD4BF, #14B8A6);
      opacity: 0;
      transition: opacity 0.6s;
    }

    .enter-btn:hover {
      border-color: rgba(45, 212, 191, 0.6);
      transform: scale(1.02);
    }

    .enter-btn:hover::before { opacity: 0.15; }

    .enter-btn span { position: relative; z-index: 1; }

    /* ===== Dissolve Transition ===== */
    .dissolve-overlay {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none;
      opacity: 0;
    }
    .dissolve-overlay.active {
      pointer-events: all;
    }

    /* Black fade out */
    .dissolve-flash {
      position: absolute; inset: 0;
      background: #0a0a0a;
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 1, 1);
    }
    .dissolve-overlay.active .dissolve-flash {
      opacity: 1;
      transition-delay: 0.3s;
    }

    /* Content dissolve state */
    .intro-content.leaving {
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      filter: blur(12px) brightness(1.5);
      opacity: 0;
      transform: scale(1.06);
    }

    .intro-content.leaving .intro-logo {
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      filter: brightness(0) invert(1) blur(20px);
      opacity: 0;
      transform: scale(1.3);
    }

    .intro-content.leaving .intro-tagline {
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
      opacity: 0;
      transform: translateY(-20px);
      filter: blur(8px);
    }

    .intro-content.leaving .enter-btn {
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: scale(0.9);
      filter: blur(6px);
    }

    /* Particle canvas for dissolve */
    .dissolve-particles {
      position: fixed; inset: 0; z-index: 199;
      pointer-events: none;
    }

    /* Background dissolves too */
    .bg-flow.leaving {
      transition: filter 1s ease-in, opacity 1s ease-in;
      filter: blur(8px) brightness(2);
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

  <div class="bg-flow">
    <canvas id="flowCanvas"></canvas>
  </div>
  <div class="grain"></div>

  <!-- Loading Screen -->
  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-box">
      <img src="logo.png" alt="Shape" class="loader-logo">
      <div class="loader-track">
        <div class="loader-fill" id="loaderFill"></div>
      </div>
      <div class="loader-percent" id="loaderPercent">0</div>
      <div class="loader-label">Loading</div>
    </div>
  </div>

  <!-- Dissolve Transition Layers -->
  <canvas class="dissolve-particles" id="dissolveCanvas"></canvas>
  <div class="dissolve-overlay" id="dissolveOverlay">
    <div class="dissolve-flash"></div>
  </div>

  <div class="intro-content" id="introContent">
    <img src="logo.png" alt="Shape" class="intro-logo" id="introLogo">
    <p class="intro-tagline" id="introTagline">Join the Community</p>
    <a href="home.html" class="enter-btn" id="enterBtn" onclick="enterSite(event)">
      <span>Enter</span>
    </a>
  </div>

  <script>
    // Flowing mesh gradient animation
    const canvas = document.getElementById('flowCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Gradient orbs
    const orbs = [
      { x: 0.3, y: 0.3, r: 0.4, vx: 0.0003, vy: 0.0002, color: [45, 212, 191] },
      { x: 0.7, y: 0.6, r: 0.35, vx: -0.0002, vy: 0.0003, color: [20, 184, 166] },
      { x: 0.5, y: 0.8, r: 0.3, vx: 0.0004, vy: -0.0002, color: [59, 130, 246] },
      { x: 0.2, y: 0.6, r: 0.25, vx: -0.0003, vy: -0.0001, color: [139, 92, 246] },
      { x: 0.8, y: 0.2, r: 0.3, vx: 0.0001, vy: 0.0004, color: [45, 212, 191] },
    ];

    function draw() {
      time++;
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, w, h);

      orbs.forEach((orb, i) => {
        // Organic movement
        orb.x += orb.vx + Math.sin(time * 0.001 + i * 1.5) * 0.0002;
        orb.y += orb.vy + Math.cos(time * 0.0012 + i * 2) * 0.0002;

        // Wrap around
        if (orb.x < -0.2) orb.x = 1.2;
        if (orb.x > 1.2) orb.x = -0.2;
        if (orb.y < -0.2) orb.y = 1.2;
        if (orb.y > 1.2) orb.y = -0.2;

        const cx = orb.x * w;
        const cy = orb.y * h;
        const radius = orb.r * Math.min(w, h);

        const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        const [r, g, b] = orb.color;
        const pulse = 0.06 + Math.sin(time * 0.002 + i) * 0.02;
        gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${pulse})`);
        gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${pulse * 0.4})`);
        gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
      });

      // Flowing lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        const startY = (h / 8) * i + Math.sin(time * 0.003 + i) * 40;
        ctx.moveTo(0, startY);
        for (let x = 0; x <= w; x += 20) {
          const y = startY + Math.sin(x * 0.003 + time * 0.002 + i) * 60 + Math.cos(x * 0.001 + time * 0.001) * 30;
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    draw();

    // ===== Loading Sequence =====
    (function runLoader() {
      const fill = document.getElementById('loaderFill');
      const percent = document.getElementById('loaderPercent');
      const overlay = document.getElementById('loaderOverlay');
      let progress = 0;

      function tick() {
        // Variable speed — starts fast, slows in middle, accelerates at end
        let increment;
        if (progress < 30) {
          increment = Math.random() * 3 + 2;
        } else if (progress < 70) {
          increment = Math.random() * 2.5 + 1.5;
        } else if (progress < 90) {
          increment = Math.random() * 2 + 1;
        } else {
          increment = Math.random() * 3 + 2;
        }

        progress = Math.min(progress + increment, 100);
        const rounded = Math.floor(progress);
        fill.style.width = rounded + '%';
        percent.textContent = rounded;

        if (rounded < 100) {
          // Variable delay for organic feel
          const delay = progress < 30 ? 50 : progress < 70 ? 80 : progress < 90 ? 65 : 35;
          setTimeout(tick, delay + Math.random() * 50);
        } else {
          // Loading complete — transition out
          setTimeout(() => {
            overlay.classList.add('done');
            // Reveal intro content
            setTimeout(() => {
              document.getElementById('introLogo').classList.add('show');
              document.getElementById('introTagline').classList.add('show');
              document.getElementById('enterBtn').classList.add('show');
            }, 300);
          }, 300);
        }
      }

      // Start after brief pause
      setTimeout(tick, 600);
    })();

    // ===== Dissolve Transition =====
    function enterSite(e) {
      e.preventDefault();

      // 1. Spawn dissolve particles
      spawnDissolveParticles();

      // 2. Trigger content dissolve
      document.getElementById('introContent').classList.add('leaving');
      document.querySelector('.bg-flow').classList.add('leaving');

      // 3. Activate flash overlay
      setTimeout(() => {
        document.getElementById('dissolveOverlay').classList.add('active');
      }, 200);

      // 4. Fade out engine sound
      if (audioCtx && ambientNodes) {
        const t = audioCtx.currentTime;
        ambientNodes.master.gain.cancelScheduledValues(t);
        ambientNodes.master.gain.setValueAtTime(ambientNodes.master.gain.value, t);
        ambientNodes.master.gain.linearRampToValueAtTime(0, t + 1.4);
      }

      // 5. Navigate after dissolve completes (black overlay fully covering)
      setTimeout(() => {
        window.location.href = 'home.html?from=intro';
      }, 1500);
    }

    // Dissolve particles effect
    function spawnDissolveParticles() {
      const dc = document.getElementById('dissolveCanvas');
      const dctx = dc.getContext('2d');
      dc.width = window.innerWidth;
      dc.height = window.innerHeight;

      const particles = [];
      const count = 120;

      // Spawn particles from center area
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
          x: dc.width / 2 + (Math.random() - 0.5) * 200,
          y: dc.height / 2 + (Math.random() - 0.5) * 150,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 3 + 0.5,
          alpha: Math.random() * 0.6 + 0.3,
          decay: Math.random() * 0.008 + 0.005,
          color: Math.random() > 0.5 ? '45,212,191' : '255,255,255',
        });
      }

      function animateParticles() {
        dctx.clearRect(0, 0, dc.width, dc.height);
        let alive = false;

        particles.forEach(p => {
          if (p.alpha <= 0) return;
          alive = true;

          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.99;
          p.vy *= 0.99;
          p.alpha -= p.decay;

          dctx.beginPath();
          dctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          dctx.fillStyle = `rgba(${p.color}, ${Math.max(0, p.alpha)})`;
          dctx.fill();
        });

        if (alive) requestAnimationFrame(animateParticles);
      }

      animateParticles();
    }
  </script>


  <script>
  // ===== AUDIO ENGINE — CINEMATIC ENGINE STARTUP =====
  let audioCtx = null;
  let ambientNodes = null;

  function ensureAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playIntroEngineSound(opts = {}) {
    const ctx = ensureAudioCtx();
    const {
      intensity = 1.0,
      duration = 9.5,
      pitchRise = 1.0,
      hoverAmount = 1.0,
      brightness = 1.0
    } = opts;

    const now = ctx.currentTime;
    const onsetEnd = 0.8;
    const rampEnd = 3.5;
    const peakEnd = 7.0;
    const tailEnd = duration;

    // Master output chain
    const master = ctx.createGain();
    master.gain.value = 0;

    // Compressor
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -10; comp.knee.value = 8;
    comp.ratio.value = 4; comp.attack.value = 0.01; comp.release.value = 0.2;

    // Master warmth filter
    const masterLP = ctx.createBiquadFilter();
    masterLP.type = 'lowpass';
    masterLP.frequency.value = 2500 + (brightness * 4500);
    masterLP.Q.value = 0.5;

    // Saturation
    const saturator = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i / 128) - 1;
      curve[i] = Math.tanh(x * 1.6);
    }
    saturator.curve = curve;
    saturator.oversample = '2x';

    master.connect(saturator);
    saturator.connect(masterLP);
    masterLP.connect(comp);
    comp.connect(ctx.destination);

    // ========== LAYER 1: SUB BASS DRONE ==========
    const sub = ctx.createOscillator();
    const subG = ctx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(35, now);
    sub.frequency.linearRampToValueAtTime(38, now + onsetEnd);
    sub.frequency.linearRampToValueAtTime(50 * pitchRise, now + rampEnd);
    sub.frequency.linearRampToValueAtTime(58 * pitchRise, now + peakEnd);
    sub.frequency.linearRampToValueAtTime(52 * pitchRise, now + tailEnd);
    subG.gain.setValueAtTime(0, now);
    subG.gain.linearRampToValueAtTime(0.12 * intensity, now + onsetEnd);
    subG.gain.linearRampToValueAtTime(0.55 * intensity, now + rampEnd);
    subG.gain.linearRampToValueAtTime(0.5 * intensity, now + peakEnd);
    subG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    sub.connect(subG); subG.connect(master);
    sub.start(now); sub.stop(now + tailEnd + 0.2);

    // Sub harmonic
    const sub2 = ctx.createOscillator();
    const sub2G = ctx.createGain();
    sub2.type = 'triangle';
    sub2.frequency.setValueAtTime(55, now);
    sub2.frequency.linearRampToValueAtTime(70 * pitchRise, now + rampEnd);
    sub2.frequency.linearRampToValueAtTime(78 * pitchRise, now + peakEnd);
    sub2G.gain.setValueAtTime(0, now);
    sub2G.gain.linearRampToValueAtTime(0.06 * intensity, now + onsetEnd);
    sub2G.gain.linearRampToValueAtTime(0.28 * intensity, now + rampEnd);
    sub2G.gain.linearRampToValueAtTime(0.22 * intensity, now + peakEnd);
    sub2G.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    sub2.connect(sub2G); sub2G.connect(master);
    sub2.start(now); sub2.stop(now + tailEnd + 0.2);

    // ========== LAYER 2: ENGINE BODY ==========
    // Detuned saw trio for wider, richer engine
    const eng1 = ctx.createOscillator();
    const eng2 = ctx.createOscillator();
    const eng3 = ctx.createOscillator();
    const engG = ctx.createGain();
    const engLP = ctx.createBiquadFilter();
    eng1.type = 'sawtooth'; eng2.type = 'sawtooth'; eng3.type = 'sawtooth';
    eng1.frequency.setValueAtTime(75, now);
    eng1.frequency.linearRampToValueAtTime(105 * pitchRise, now + rampEnd);
    eng1.frequency.linearRampToValueAtTime(118 * pitchRise, now + peakEnd);
    eng1.frequency.linearRampToValueAtTime(110 * pitchRise, now + tailEnd);
    eng2.frequency.setValueAtTime(76.2, now);
    eng2.frequency.linearRampToValueAtTime(106.5 * pitchRise, now + rampEnd);
    eng2.frequency.linearRampToValueAtTime(119.3 * pitchRise, now + peakEnd);
    eng2.frequency.linearRampToValueAtTime(111.5 * pitchRise, now + tailEnd);
    eng3.frequency.setValueAtTime(74.3, now);
    eng3.frequency.linearRampToValueAtTime(104.2 * pitchRise, now + rampEnd);
    eng3.frequency.linearRampToValueAtTime(117.1 * pitchRise, now + peakEnd);
    eng3.frequency.linearRampToValueAtTime(109.2 * pitchRise, now + tailEnd);
    engLP.type = 'lowpass';
    engLP.frequency.setValueAtTime(90, now);
    engLP.frequency.linearRampToValueAtTime(110, now + onsetEnd);
    engLP.frequency.linearRampToValueAtTime(300, now + rampEnd);
    engLP.frequency.linearRampToValueAtTime(380, now + peakEnd);
    engLP.frequency.linearRampToValueAtTime(200, now + tailEnd);
    engLP.Q.value = 5;
    engG.gain.setValueAtTime(0, now);
    engG.gain.linearRampToValueAtTime(0.04 * intensity, now + onsetEnd);
    engG.gain.linearRampToValueAtTime(0.3 * intensity, now + rampEnd);
    engG.gain.linearRampToValueAtTime(0.28 * intensity, now + peakEnd);
    engG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    eng1.connect(engLP); eng2.connect(engLP); eng3.connect(engLP);
    engLP.connect(engG); engG.connect(master);
    eng1.start(now); eng2.start(now); eng3.start(now);
    eng1.stop(now + tailEnd + 0.2); eng2.stop(now + tailEnd + 0.2); eng3.stop(now + tailEnd + 0.2);

    // Mid resonant layer
    const mid = ctx.createOscillator();
    const midG = ctx.createGain();
    const midBP = ctx.createBiquadFilter();
    mid.type = 'sawtooth';
    mid.frequency.setValueAtTime(140, now);
    mid.frequency.linearRampToValueAtTime(175 * pitchRise, now + rampEnd);
    mid.frequency.linearRampToValueAtTime(200 * pitchRise, now + peakEnd);
    midBP.type = 'bandpass'; midBP.frequency.value = 220; midBP.Q.value = 3;
    midG.gain.setValueAtTime(0, now);
    midG.gain.linearRampToValueAtTime(0.015 * intensity, now + onsetEnd);
    midG.gain.linearRampToValueAtTime(0.1 * intensity, now + rampEnd);
    midG.gain.linearRampToValueAtTime(0.09 * intensity, now + peakEnd);
    midG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    mid.connect(midBP); midBP.connect(midG); midG.connect(master);
    mid.start(now); mid.stop(now + tailEnd + 0.2);

    // ========== LAYER 3: HOVER MODULATION ==========
    const hoverLFO = ctx.createOscillator();
    const hoverLFOG = ctx.createGain();
    hoverLFO.type = 'sine';
    hoverLFO.frequency.value = 1.4;
    hoverLFOG.gain.setValueAtTime(0, now);
    hoverLFOG.gain.linearRampToValueAtTime(30 * hoverAmount, now + rampEnd);
    hoverLFOG.gain.linearRampToValueAtTime(45 * hoverAmount, now + peakEnd);
    hoverLFOG.gain.linearRampToValueAtTime(15 * hoverAmount, now + tailEnd);
    hoverLFO.connect(hoverLFOG);
    hoverLFOG.connect(engLP.frequency);
    hoverLFO.start(now); hoverLFO.stop(now + tailEnd + 0.2);

    // Tremolo
    const tremLFO = ctx.createOscillator();
    const tremLFOG = ctx.createGain();
    tremLFO.type = 'sine';
    tremLFO.frequency.value = 2.0;
    tremLFOG.gain.setValueAtTime(0, now);
    tremLFOG.gain.linearRampToValueAtTime(0.025 * hoverAmount, now + rampEnd);
    tremLFOG.gain.linearRampToValueAtTime(0.04 * hoverAmount, now + peakEnd);
    tremLFO.connect(tremLFOG);
    tremLFOG.connect(engG.gain);
    tremLFO.start(now); tremLFO.stop(now + tailEnd + 0.2);

    // Sub drift
    const driftLFO = ctx.createOscillator();
    const driftLFOG = ctx.createGain();
    driftLFO.type = 'sine';
    driftLFO.frequency.value = 0.3;
    driftLFOG.gain.setValueAtTime(0, now);
    driftLFOG.gain.linearRampToValueAtTime(3 * hoverAmount, now + rampEnd);
    driftLFOG.gain.linearRampToValueAtTime(5 * hoverAmount, now + peakEnd);
    driftLFO.connect(driftLFOG);
    driftLFOG.connect(sub.frequency);
    driftLFO.start(now); driftLFO.stop(now + tailEnd + 0.2);

    // ========== LAYER 4: HIGH ELECTRIC SHEEN ==========
    const noiseLen = ctx.sampleRate * Math.ceil(tailEnd + 1);
    const noiseBuf = ctx.createBuffer(2, noiseLen, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = noiseBuf.getChannelData(ch);
      for (let i = 0; i < noiseLen; i++) d[i] = Math.random() * 2 - 1;
    }

    // High sheen noise
    const sheen = ctx.createBufferSource();
    sheen.buffer = noiseBuf;
    const sheenBP = ctx.createBiquadFilter();
    sheenBP.type = 'bandpass';
    sheenBP.frequency.setValueAtTime(1800, now);
    sheenBP.frequency.linearRampToValueAtTime(3500 * brightness, now + rampEnd);
    sheenBP.frequency.linearRampToValueAtTime(4500 * brightness, now + peakEnd);
    sheenBP.frequency.linearRampToValueAtTime(2500 * brightness, now + tailEnd);
    sheenBP.Q.value = 1.2;
    const sheenG = ctx.createGain();
    sheenG.gain.setValueAtTime(0, now);
    sheenG.gain.linearRampToValueAtTime(0.004 * intensity * brightness, now + onsetEnd);
    sheenG.gain.linearRampToValueAtTime(0.022 * intensity * brightness, now + rampEnd);
    sheenG.gain.linearRampToValueAtTime(0.03 * intensity * brightness, now + peakEnd);
    sheenG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    sheen.connect(sheenBP); sheenBP.connect(sheenG); sheenG.connect(master);
    sheen.start(now); sheen.stop(now + tailEnd + 0.2);

    // Air pressure rumble
    const airNoise = ctx.createBufferSource();
    airNoise.buffer = noiseBuf;
    const airLP = ctx.createBiquadFilter();
    airLP.type = 'lowpass'; airLP.frequency.value = 120; airLP.Q.value = 2;
    const airG = ctx.createGain();
    airG.gain.setValueAtTime(0, now);
    airG.gain.linearRampToValueAtTime(0.05 * intensity, now + onsetEnd);
    airG.gain.linearRampToValueAtTime(0.16 * intensity, now + rampEnd);
    airG.gain.linearRampToValueAtTime(0.14 * intensity, now + peakEnd);
    airG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    airNoise.connect(airLP); airLP.connect(airG); airG.connect(master);
    airNoise.start(now); airNoise.stop(now + tailEnd + 0.2);

    // ========== LAYER 5: FUTURISTIC ELEMENTS ==========

    // Resonant sweep — rising bandpass sweep for sci-fi character
    const sweepNoise = ctx.createBufferSource();
    sweepNoise.buffer = noiseBuf;
    const sweepBP = ctx.createBiquadFilter();
    sweepBP.type = 'bandpass';
    sweepBP.frequency.setValueAtTime(200, now);
    sweepBP.frequency.exponentialRampToValueAtTime(800, now + rampEnd);
    sweepBP.frequency.exponentialRampToValueAtTime(1800, now + peakEnd);
    sweepBP.frequency.exponentialRampToValueAtTime(600, now + tailEnd);
    sweepBP.Q.value = 12;
    const sweepG = ctx.createGain();
    sweepG.gain.setValueAtTime(0, now);
    sweepG.gain.linearRampToValueAtTime(0.01 * intensity, now + onsetEnd);
    sweepG.gain.linearRampToValueAtTime(0.06 * intensity * brightness, now + rampEnd);
    sweepG.gain.linearRampToValueAtTime(0.05 * intensity * brightness, now + peakEnd);
    sweepG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    sweepNoise.connect(sweepBP); sweepBP.connect(sweepG); sweepG.connect(master);
    sweepNoise.start(now); sweepNoise.stop(now + tailEnd + 0.2);

    // Primary electric whine — slowly rising
    const whine = ctx.createOscillator();
    const whineG = ctx.createGain();
    whine.type = 'sine';
    whine.frequency.setValueAtTime(2800, now);
    whine.frequency.linearRampToValueAtTime(3200, now + onsetEnd);
    whine.frequency.linearRampToValueAtTime(4500 * brightness, now + rampEnd);
    whine.frequency.linearRampToValueAtTime(5800 * brightness, now + peakEnd);
    whine.frequency.linearRampToValueAtTime(4200 * brightness, now + tailEnd);
    whineG.gain.setValueAtTime(0, now);
    whineG.gain.linearRampToValueAtTime(0.001 * intensity * brightness, now + onsetEnd);
    whineG.gain.linearRampToValueAtTime(0.005 * intensity * brightness, now + rampEnd);
    whineG.gain.linearRampToValueAtTime(0.008 * intensity * brightness, now + peakEnd);
    whineG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    whine.connect(whineG); whineG.connect(master);
    whine.start(now); whine.stop(now + tailEnd + 0.2);

    // Secondary whine — detuned for shimmer
    const whine2 = ctx.createOscillator();
    const whine2G = ctx.createGain();
    whine2.type = 'sine';
    whine2.frequency.setValueAtTime(2830, now);
    whine2.frequency.linearRampToValueAtTime(3260, now + onsetEnd);
    whine2.frequency.linearRampToValueAtTime(4580 * brightness, now + rampEnd);
    whine2.frequency.linearRampToValueAtTime(5900 * brightness, now + peakEnd);
    whine2.frequency.linearRampToValueAtTime(4280 * brightness, now + tailEnd);
    whine2G.gain.setValueAtTime(0, now);
    whine2G.gain.linearRampToValueAtTime(0.0008 * intensity * brightness, now + onsetEnd);
    whine2G.gain.linearRampToValueAtTime(0.004 * intensity * brightness, now + rampEnd);
    whine2G.gain.linearRampToValueAtTime(0.006 * intensity * brightness, now + peakEnd);
    whine2G.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    whine2.connect(whine2G); whine2G.connect(master);
    whine2.start(now); whine2.stop(now + tailEnd + 0.2);

    // Harmonic shimmer — soft high harmonic that appears at peak
    const shimmer = ctx.createOscillator();
    const shimmerG = ctx.createGain();
    const shimmerF = ctx.createBiquadFilter();
    shimmer.type = 'sine';
    shimmer.frequency.setValueAtTime(880, now);
    shimmer.frequency.linearRampToValueAtTime(1100 * pitchRise, now + rampEnd);
    shimmer.frequency.linearRampToValueAtTime(1320 * pitchRise, now + peakEnd);
    shimmer.frequency.linearRampToValueAtTime(1100 * pitchRise, now + tailEnd);
    shimmerF.type = 'bandpass'; shimmerF.frequency.value = 1200; shimmerF.Q.value = 8;
    shimmerG.gain.setValueAtTime(0, now);
    shimmerG.gain.linearRampToValueAtTime(0, now + rampEnd * 0.6);
    shimmerG.gain.linearRampToValueAtTime(0.012 * intensity * brightness, now + rampEnd);
    shimmerG.gain.linearRampToValueAtTime(0.018 * intensity * brightness, now + peakEnd);
    shimmerG.gain.linearRampToValueAtTime(0.001, now + tailEnd);
    shimmer.connect(shimmerF); shimmerF.connect(shimmerG); shimmerG.connect(master);
    shimmer.start(now); shimmer.stop(now + tailEnd + 0.2);

    // Shimmer LFO — gentle wobble on the harmonic
    const shimLFO = ctx.createOscillator();
    const shimLFOG = ctx.createGain();
    shimLFO.type = 'sine';
    shimLFO.frequency.value = 3.5;
    shimLFOG.gain.value = 0.004;
    shimLFO.connect(shimLFOG);
    shimLFOG.connect(shimmerG.gain);
    shimLFO.start(now); shimLFO.stop(now + tailEnd + 0.2);

    // Reactor pulse — very low freq modulation on everything for "alive" feel
    const reactorLFO = ctx.createOscillator();
    const reactorLFOG = ctx.createGain();
    reactorLFO.type = 'sine';
    reactorLFO.frequency.value = 0.15;
    reactorLFOG.gain.setValueAtTime(0, now);
    reactorLFOG.gain.linearRampToValueAtTime(0.04 * intensity, now + rampEnd);
    reactorLFOG.gain.linearRampToValueAtTime(0.06 * intensity, now + peakEnd);
    reactorLFO.connect(reactorLFOG);
    reactorLFOG.connect(master.gain);
    reactorLFO.start(now); reactorLFO.stop(now + tailEnd + 0.2);

    // ========== MASTER ENVELOPE ==========
    master.gain.setValueAtTime(0, now);
    master.gain.linearRampToValueAtTime(0.25 * intensity, now + onsetEnd);
    master.gain.linearRampToValueAtTime(0.8 * intensity, now + rampEnd);
    master.gain.linearRampToValueAtTime(1.0 * intensity, now + peakEnd);
    master.gain.linearRampToValueAtTime(0.001, now + tailEnd);

    ambientNodes = { master };
  }

  // Start engine sound on first interaction
  let audioStarted = false;
  const AUDIO_EVENTS = ['click','touchstart','touchend','mousedown','keydown','pointerdown'];

  function unlockAndPlay(ctx) {
    try {
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.start(0);
    } catch(e) {}
    try { playIntroEngineSound(); } catch(e) { console.warn('audio error:', e); }
  }

  function initAudio() {
    if (audioStarted) return;
    audioStarted = true;
    AUDIO_EVENTS.forEach(evt => window.removeEventListener(evt, initAudio, true));
    try {
      const ctx = ensureAudioCtx();
      if (ctx.state === 'suspended') {
        ctx.resume().then(() => unlockAndPlay(ctx)).catch(() => unlockAndPlay(ctx));
      } else {
        unlockAndPlay(ctx);
      }
    } catch(e) { console.warn('audio init error:', e); }
  }

  AUDIO_EVENTS.forEach(evt => {
    const opts = evt === 'touchstart' ? { capture: true, passive: false } : { capture: true, passive: true };
    window.addEventListener(evt, initAudio, opts);
  });
  </script>

  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
