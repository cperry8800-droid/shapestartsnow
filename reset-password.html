<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Shape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
    .rp-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .rp-wrap { width: 100%; max-width: 420px; }
    .rp-logo { text-align: center; margin-bottom: 32px; }
    .rp-logo img { height: 76px; }
    .rp-heading { font-size: clamp(1.1rem, 1.8vw, 1.3rem); font-weight: 300; letter-spacing: -0.04em; margin-bottom: 8px; text-align: center; }
    .rp-sub { color: var(--text-muted); font-size: 0.92rem; font-weight: 300; margin-bottom: 36px; text-align: center; }
    .rp-group { margin-bottom: 24px; text-align: center; }
    .rp-group label { display: block; font-size: 0.78rem; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
    .rp-group input { width: 100%; padding: 14px 0; border: none; border-bottom: 1px solid var(--border); background: transparent; color: var(--text); font-size: 1rem; font-family: inherit; transition: border-color 0.3s; outline: none; text-align: center; }
    .rp-group input:focus { border-color: var(--text); }
    .rp-msg { text-align: center; font-size: 0.88rem; margin-top: 16px; min-height: 1.2em; }
    .rp-msg.err { color: #EF4444; }
    .rp-msg.ok { color: #10B981; }
  </style>
  <meta name="theme-color" content="#1A1A1A">
</head>
<body>

  <div class="rp-page">
    <div class="rp-wrap">
      <div class="rp-logo"><img src="logo.png" alt="Shape"></div>
      <h2 class="rp-heading">Set a new password</h2>
      <p class="rp-sub">Enter a new password for your Shape account.</p>

      <div class="rp-group">
        <label>New Password</label>
        <input type="password" id="rpPassword" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <div class="rp-group">
        <label>Confirm Password</label>
        <input type="password" id="rpConfirm" placeholder="Re-enter password" autocomplete="new-password">
      </div>

      <button class="btn btn-primary btn-block" onclick="shapeUpdatePassword()" id="rpSubmit">Update Password</button>
      <div class="rp-msg" id="rpMsg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function shapeUpdatePassword() {
      var pwd = document.getElementById('rpPassword').value;
      var confirm = document.getElementById('rpConfirm').value;
      var msg = document.getElementById('rpMsg');
      var btn = document.getElementById('rpSubmit');
      msg.className = 'rp-msg';
      msg.textContent = '';

      if (!pwd || pwd.length < 6) { msg.className = 'rp-msg err'; msg.textContent = 'Password must be at least 6 characters.'; return; }
      if (pwd !== confirm) { msg.className = 'rp-msg err'; msg.textContent = 'Passwords do not match.'; return; }
      if (!window.shapeDb) { msg.className = 'rp-msg err'; msg.textContent = 'Auth client not loaded.'; return; }

      btn.disabled = true; btn.textContent = 'Updating...';
      var res = await window.shapeDb.client.auth.updateUser({ password: pwd });
      if (res.error) {
        msg.className = 'rp-msg err';
        msg.textContent = res.error.message || 'Could not update password. The reset link may have expired.';
        btn.disabled = false; btn.textContent = 'Update Password';
        return;
      }
      msg.className = 'rp-msg ok';
      msg.textContent = 'Password updated. Redirecting to your dashboard...';
      var profile = await window.shapeDb.getProfile();
      var dest = profile ? window.shapeDb.dashboardFor(profile.role) : 'login.html';
      setTimeout(function () { window.location.href = dest; }, 1200);
    }
  </script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
